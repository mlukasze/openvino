name: Sync fork with upstream

on:
  schedule:
    # Run daily at 14:00 UTC (~16:00 UTC+2)
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-fork-with-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'mlukasze/openvino'
    timeout-minutes: 15

    steps:
      # v4.2.2
      - name: Checkout repository
        uses: >-
          actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: master
          fetch-depth: 0

      - name: Sync master with upstream
        shell: bash
        run: |
          set -euo pipefail

          upstream_url="https://github.com/openvinotoolkit/openvino.git"
          git remote add upstream "${upstream_url}"
          git fetch --no-tags upstream master

          local_sha="$(git rev-parse HEAD)"
          upstream_ref="refs/remotes/upstream/master"
          upstream_sha="$(git rev-parse "${upstream_ref}")"

          if [[ "${local_sha}" == "${upstream_sha}" ]]; then
            echo "Fork master is already up to date."
            exit 0
          fi

          if ! git merge-base --is-ancestor "${local_sha}" "${upstream_sha}"; then
            echo "origin/master is not an ancestor of upstream/master; cannot fast-forward."
            exit 1
          fi

          git push origin refs/remotes/upstream/master:refs/heads/master
